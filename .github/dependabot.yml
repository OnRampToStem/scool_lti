version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-patch-days: 3
    groups:
      dev-dependencies:
        dependency-type: development
      prod-dependencies:
        dependency-type: production
        update-types:
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
    
